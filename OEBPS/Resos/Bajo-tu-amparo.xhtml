  <title>Bajo tu amparo</title>
  <link rel="stylesheet" type="text/css" href="../styles/stylesheet.css" />

<body>
  <h2>Bajo tu amparo</h2>
  <p>
    Bajo tu amparo nos acogemos,<br/>
    santa Madre de Dios;
  </p>
  <p>
    no desprecies nuestras súplicas en las necesidades,<br/>
    antes bien,
  </p>
  <p>
    líbranos de todo peligro,<br/>
    ¡oh Virgen gloriosa y bendita.
  </p>
  <p>
    Amén.
  </p>
</body>

  <h2>Segundo Misterio Luminoso</h2>
  <h1>EL MATRIMONIO EN CANÁ</h1>
  <p>
    Pero su madre dijo a los sirvientes:<br/>
    "Hagan lo que les diga."<br/>
    Jesús dijo:<br/>
    "Llenen de agua esos recipientes."<br/>
    Y los llenaron hasta el borde.<br/>
    (San Juan 2, 5-7)
  </p>
  <p>Fruto Del Misterio: A Jesús A Través De María</p>

name: Build and Release Rosario EPUB

on:
  push:
    branches:
      - main
  workflow_dispatch:  # Allows manual triggering

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Run PowerShell build script
        shell: pwsh
        run: |
          ./makeRosarioEpub.ps1

      - name: Authenticate GitHub CLI
        shell: pwsh
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | gh auth login --with-token

      - name: Create release
        shell: pwsh
        run: |
          $version = "v$(Get-Date -Format 'yyyy.MM.dd.HHmm')"
          $shortSha = "${{ github.sha }}".Substring(0, 7)
          $tag = "$version-$shortSha"
          gh release create $tag --title "Release $tag" --notes "Automated Rosario EPUB build"
          
      - name: Upload EPUB assets
        shell: pwsh
        run: |
          $tag = gh release list --limit 1 --json tagName --jq ".[0].tagName"
          gh release upload $tag ./*.epub --clobber

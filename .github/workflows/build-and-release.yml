name: Build and Release Rosario EPUB

on:
  push:
    branches:
      - main
  workflow_dispatch:  # Allows manual triggering

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Run PowerShell build script
        shell: pwsh
        run: |
          ./makeRosarioEpub.ps1
      
      - name: Generate version
        id: get_version
        shell: pwsh
        run: |
          $version = "v$(Get-Date -Format 'yyyy.MM.dd.HHmm')"
          $shortSha = "${{ github.sha }}".Substring(0, 7)
          $tag = "$version-$shortSha"
          echo "version=$version" >> $env:GITHUB_OUTPUT
          echo "tag=$tag" >> $env:GITHUB_OUTPUT

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.get_version.outputs.tag }}
          release_name: Rosario EPUB ${{ steps.get_version.outputs.version }}
          body: |
            📖 Rosario EPUB - Auto-generated from commit ${{ github.sha }}
          draft: false
          prerelease: false

      - name: Upload EPUB as release asset
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./Rosario.epub  # change if your build writes to a different path
          asset_name: Rosario.epub
          asset_content_type: application/epub+zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
